name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  changesets:
    name: Release
    outputs:
      hasChangesets: ${{ steps.changesets-action.outputs.hasChangesets }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Required to push version commits created by changesets/action.
      pull-requests: write # Required to open or update the release pull request.
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request
        id: changesets-action
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf
        with:
          version: pnpm run version
          commit: "ci: release"
          title: "ci: release"
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Retrieve version of `@portone/client-sdk-generator`
  version:
    name: Check Client SDK Generator version
    runs-on: ubuntu-24.04
    needs: changesets
    if: needs.changesets.outputs.hasChangesets == 'false'
    permissions:
      contents: read
    outputs:
      client-sdk-generator-version: ${{ steps.client-sdk-generator-version-changed.outputs.version }}
      client-sdk-generator-version-changed: ${{ steps.client-sdk-generator-version-changed.outputs.changed }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Check Client SDK Generator version changes
        id: client-sdk-generator-version-changed
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320
        with:
          diff-search: true
          file-name: packages/@portone/client-sdk-generator/package.json

  # Building jobs

  build-binaries:
    needs: version
    if: needs.version.outputs.client-sdk-generator-version-changed == 'true'
    outputs:
      version: ${{ needs.version.outputs.client-sdk-generator-version }}
    strategy:
      matrix:
        include:
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            code-target: win32-x64
          - os: windows-2025
            target: aarch64-pc-windows-msvc
            code-target: win32-arm64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            code-target: linux-x64-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            code-target: linux-arm64-musl
          - os: macos-14
            target: x86_64-apple-darwin
            code-target: darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            code-target: darwin-arm64

    name: Package ${{ matrix.code-target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup target add "$TARGET"
        env:
          TARGET: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.code-target == 'linux-x64-musl' || matrix.code-target == 'linux-arm64-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cargo-audit
        uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37
        if: matrix.code-target == 'linux-x64-musl'
        with:
          tool: cargo-audit

      - name: Audit crates.io dependencies
        if: matrix.code-target == 'linux-x64-musl'
        run: cargo audit

      # Build the Client SDK Generator binary
      - name: Build binaries
        run: cargo build -p client_sdk_generator --release --target "$TARGET"
        env:
          TARGET: ${{ matrix.target }}
          # Strip all debug symbols from the resulting binaries
          RUSTFLAGS: "-C strip=symbols -C codegen-units=1"

      # Copy the Client SDK Generator binary and rename it to include the name of the target platform
      - name: Copy Client SDK Generator binary
        if: matrix.os == 'windows-2025'
        run: |
          mkdir dist
          cp "target/$TARGET/release/portone-client-sdk-generator.exe" "./dist/portone-client-sdk-generator-$CODE_TARGET.exe"
        env:
          TARGET: ${{ matrix.target }}
          CODE_TARGET: ${{ matrix.code-target }}
      - name: Copy Client SDK Generator binary
        if: matrix.os != 'windows-2025'
        run: |
          mkdir dist
          cp "target/$TARGET/release/portone-client-sdk-generator" "./dist/portone-client-sdk-generator-$CODE_TARGET"
        env:
          TARGET: ${{ matrix.target }}
          CODE_TARGET: ${{ matrix.code-target }}

      # Upload the Client SDK Generator binary as a build artifact
      - name: Upload Client SDK Generator artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: client-sdk-generator-${{ matrix.target }}
          path: ./dist/portone-client-sdk-generator-*
          if-no-files-found: error

  # Build GNU/Linux binaries in Docker, using Debian 11 (bullseye), to support older versions of glibc.
  build-binaries-gnu:
    needs: version
    if: needs.version.outputs.client-sdk-generator-version-changed == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            code-target: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            code-target: linux-arm64

    name: Package ${{ matrix.code-target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    container:
      image: rust:1.89.0-bullseye@sha256:8f72d971a31b278cebdb2eb64a44c3900ff27c716a4ef6f4db05946d10c9ae4e

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set jemalloc page size for linux-arm64
        if: matrix.code-target == 'linux-arm64'
        run: |
          echo "JEMALLOC_SYS_WITH_LG_PAGE=16" >> $GITHUB_ENV

      # Build the Client SDK Generator binary
      - name: Build binaries
        run: cargo build -p client_sdk_generator --release --target "$TARGET"
        env:
          TARGET: ${{ matrix.target }}
          # Strip all debug symbols from the resulting binaries
          RUSTFLAGS: "-C strip=symbols -C codegen-units=1"

      # Copy the Client SDK Generator binary and rename it to include the name of the target platform
      - name: Copy Client SDK Generator binary
        run: |
          mkdir dist
          cp "target/$TARGET/release/portone-client-sdk-generator" "./dist/portone-client-sdk-generator-$CODE_TARGET"
        env:
          TARGET: ${{ matrix.target }}
          CODE_TARGET: ${{ matrix.code-target }}

      # Upload the Client SDK Generator binary as a build artifact
      - name: Upload Client SDK Generator artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: client-sdk-generator-${{ matrix.target }}
          path: ./dist/portone-client-sdk-generator-*
          if-no-files-found: error

  # Publishing jobs

  package-client-sdk-generator:
    name: Package Client SDK Generator
    runs-on: ubuntu-24.04
    needs:
      - build-binaries
      - build-binaries-gnu
    if: needs.build-binaries.outputs.version
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Download Client SDK Generator artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: client-sdk-generator-*
          merge-multiple: true
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate npm packages
        run: node packages/@portone/client-sdk-generator/scripts/generate-packages.js

      - name: Pack npm packages
        run: |
          mkdir npm-packages
          for package in packages/@portone/*; do
            npm pack "$package" --pack-destination npm-packages
          done

      - name: Upload npm package tarballs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-packages
          path: npm-packages/*.tgz
          if-no-files-found: error

      - name: Generate release notes
        run: bash scripts/print-changelog.sh "$VERSION" > RELEASE_NOTES
        env:
          VERSION: ${{ needs.build-binaries.outputs.version }}

      - name: Upload release notes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-notes
          path: RELEASE_NOTES
          if-no-files-found: error

  publish-client-sdk-generator:
    name: Publish Client SDK Generator
    runs-on: ubuntu-24.04
    needs:
      - build-binaries
      - build-binaries-gnu
      - package-client-sdk-generator
    if: needs.build-binaries.outputs.version
    environment: npm-publish
    permissions:
      contents: write # Required to create the GitHub release and tag.
      id-token: write # Required for npm provenance during publish.
    steps:
      - name: Download Client SDK Generator artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: client-sdk-generator-*
          path: release-assets
          merge-multiple: true

      - name: Download npm package tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: npm-packages
          path: npm-packages

      - name: Download release notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-notes
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish npm packages as latest
        run: |
          for package in npm-packages/*.tgz; do
            npm publish "$package" --tag latest --access public --provenance
          done

      - name: Create GitHub @portone/client-sdk-generator release and tag
        run: |
          shopt -s nullglob
          assets=(release-assets/portone-client-sdk-generator-*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi
          gh release create "$TAG_NAME" "${assets[@]}" \
            --title "PortOne Client SDK Generator v$VERSION" \
            --notes-file RELEASE_NOTES \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: "@portone/client-sdk-generator@${{ needs.build-binaries.outputs.version }}"
          VERSION: ${{ needs.build-binaries.outputs.version }}
